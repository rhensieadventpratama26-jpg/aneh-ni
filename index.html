<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Special Space</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <div class="card">
        <div class="profile-area">
            <img src="https://picsum.photos/100" alt="Foto Profil" class="profile-img">
        </div>
        
        <h1 id="typing-text"></h1>
        <p class="sub-text">Klik tombol di bawah untuk memutar musik & kejutan!</p>

        <div class="btn-group">
            <button id="play-btn" onclick="mulaiWeb()">🎵 Putar Musik</button>
        </div>
    </div>

    <audio id="bg-music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

    <script href="script.js"></script>
</body>
</html>
